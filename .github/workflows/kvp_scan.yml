name: KVP x Funda Dagelijkse Scan

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scan:
    name: Scan KVP-lijst en vergelijk met Funda
    runs-on: ubuntu-latest

    steps:
      - name: Bestanden ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Packages installeren
        run: pip install -r requirements.txt

      - name: KVP x Funda scan uitvoeren
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python kvp_scanner.py

      - name: Resultaten opslaan als download
        uses: actions/upload-artifact@v4
        with:
          name: kvp-funda-resultaten-${{ github.run_number }}
          path: |
            output/kvp_funda_matches.xlsx
            output/resultaten.json
            output/scanner.log
          retention-days: 30

      - name: Samenvatting weergeven
        if: always()
        run: |
          echo "## KVP x Funda Scan Resultaten" >> $GITHUB_STEP_SUMMARY
          if [ -f output/resultaten.json ]; then
            MATCHES=$(python3 -c "import json; d=json.load(open('output/resultaten.json')); print(len(d.get('matches', [])))")
            TEKOOP=$(python3 -c "import json; d=json.load(open('output/resultaten.json')); print(sum(1 for m in d.get('matches',[]) if m.get('status')=='Te koop'))")
            STRATEN=$(python3 -c "import json; d=json.load(open('output/resultaten.json')); print(d.get('straten_gescand', '?'))")
            echo "| Statistiek | Waarde |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Totaal matches | $MATCHES |" >> $GITHUB_STEP_SUMMARY
            echo "| Waarvan Te koop | $TEKOOP |" >> $GITHUB_STEP_SUMMARY
            echo "| Straten gescand | $STRATEN |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Geen resultatenbestand gevonden." >> $GITHUB_STEP_SUMMARY
          fi
